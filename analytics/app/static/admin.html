<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8 font-sans">
  <div class="max-w-6xl mx-auto">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Task Admin Dashboard</h1>
        <p class="text-sm text-gray-500 mt-0.5">Asian Capital Markets — async task monitoring</p>
      </div>
      <span id="ws-badge"
        class="inline-flex items-center gap-1.5 px-3 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-700">
        ● Connecting…
      </span>
    </div>

    <!-- Action buttons -->
    <div class="flex gap-3 mb-8">
      <button id="btn-email" onclick="triggerEmail()"
        class="px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 active:scale-95 transition disabled:opacity-40 disabled:cursor-not-allowed">
        Send Email Notifications
      </button>
      <button id="btn-analysis" onclick="triggerAnalysis()"
        class="px-5 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 active:scale-95 transition disabled:opacity-40 disabled:cursor-not-allowed">
        Run Market Analysis
      </button>
    </div>

    <!-- Task table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
        <h2 class="font-semibold text-gray-700">Task History</h2>
        <button onclick="loadHistory()" class="text-xs text-blue-500 hover:underline">Refresh</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-500 uppercase text-xs tracking-wide">
            <tr>
              <th class="px-5 py-3 text-left">Operation</th>
              <th class="px-5 py-3 text-left">Task ID</th>
              <th class="px-5 py-3 text-left">Status</th>
              <th class="px-5 py-3 text-left">Input</th>
              <th class="px-5 py-3 text-left">Result</th>
              <th class="px-5 py-3 text-left">Completed At</th>
            </tr>
          </thead>
          <tbody id="task-tbody" class="divide-y divide-gray-50">
            <tr>
              <td colspan="6" class="px-5 py-8 text-center text-gray-400 text-sm">
                Loading history…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ── state ────────────────────────────────────────────────────────────────
    const tasks = {};   // task_id → row object
    let ws = null;

    // ── WebSocket ─────────────────────────────────────────────────────────────
    function connectWS() {
      const url = `ws://${location.host}/ws/tasks`;
      ws = new WebSocket(url);

      ws.onopen = () => setBadge('● Connected', 'bg-green-100 text-green-700');

      ws.onmessage = ({ data }) => {
        const evt = JSON.parse(data);
        upsertTask({
          task_id:      evt.task_id,
          operation:    evt.operation,
          status:       evt.status,
          input_data:   tasks[evt.task_id]?.input_data ?? null,
          result:       evt.result,
          completed_at: evt.completed_at,
        });
        render();
      };

      ws.onclose = () => {
        setBadge('● Disconnected — reconnecting…', 'bg-red-100 text-red-700');
        setTimeout(connectWS, 3000);
      };

      ws.onerror = () => ws.close();
    }

    function setBadge(text, cls) {
      const el = document.getElementById('ws-badge');
      el.textContent = text;
      el.className = `inline-flex items-center gap-1.5 px-3 py-1 text-xs font-medium rounded-full ${cls}`;
    }

    // ── history ───────────────────────────────────────────────────────────────
    async function loadHistory() {
      try {
        const rows = await fetch('/tasks/history').then(r => r.json());
        rows.forEach(r => upsertTask(r));
        render();
      } catch (e) {
        console.error('loadHistory failed', e);
      }
    }

    // ── task triggers ─────────────────────────────────────────────────────────
    async function triggerEmail() {
      const btn = document.getElementById('btn-email');
      btn.disabled = true;
      try {
        const { task_id } = await fetch('/tasks/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        }).then(r => r.json());
        upsertTask({ task_id, operation: 'send_email_notification', status: 'queued', input_data: null, result: null, completed_at: null });
        render();
      } catch (e) {
        alert('Failed to trigger email task: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function triggerAnalysis() {
      const btn = document.getElementById('btn-analysis');
      btn.disabled = true;
      try {
        const { task_id } = await fetch('/tasks/analysis', { method: 'POST' }).then(r => r.json());
        upsertTask({ task_id, operation: 'run_market_analysis', status: 'queued', input_data: null, result: null, completed_at: null });
        render();
      } catch (e) {
        alert('Failed to trigger analysis task: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    // ── helpers ───────────────────────────────────────────────────────────────
    function upsertTask(row) {
      tasks[row.task_id] = { ...(tasks[row.task_id] ?? {}), ...row };
    }

    function statusBadge(status) {
      const map = {
        success:  'bg-green-100 text-green-700',
        SUCCESS:  'bg-green-100 text-green-700',
        STARTED:  'bg-blue-100  text-blue-700',
        PENDING:  'bg-yellow-100 text-yellow-700',
        queued:   'bg-gray-100  text-gray-600',
        FAILURE:  'bg-red-100   text-red-700',
        failure:  'bg-red-100   text-red-700',
      };
      const cls = map[status] ?? 'bg-gray-100 text-gray-600';
      return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${status}</span>`;
    }

    function summariseResult(op, result) {
      if (!result) return '<span class="text-gray-300">—</span>';
      if (typeof result === 'string') {
        try { result = JSON.parse(result); } catch { return result; }
      }
      if (op === 'send_email_notification') {
        const tm = result.top_movers ?? [];
        const topStr = tm.length
          ? tm.map(m => `${m.name ?? m.ticker} (${m.weekly_return ?? '?'}%)`).join(', ')
          : '—';
        return `<span class="font-medium">${result.users_notified ?? '?'} users notified</span>`
             + `<br/><span class="text-gray-400 text-xs">Top movers: ${topStr}</span>`;
      }
      if (op === 'run_market_analysis') {
        const cs = result.country_stats ?? {};
        const preview = Object.entries(cs).slice(0, 3)
          .map(([c, s]) => `${c}: avg ${s.avg_weekly_return ?? '?'}%`).join(' · ');
        return `<span class="font-medium">${result.countries_analyzed ?? '?'} countries</span>`
             + `<br/><span class="text-gray-400 text-xs">${preview}${Object.keys(cs).length > 3 ? ' …' : ''}</span>`;
      }
      return JSON.stringify(result).slice(0, 100);
    }

    function inputSummary(op, input) {
      if (!input) return '<span class="text-gray-300">—</span>';
      if (typeof input === 'string') { try { input = JSON.parse(input); } catch { return input; } }
      if (op === 'send_email_notification') {
        const users = input.users ?? [];
        return users.length ? users.join(', ') : `${input.top_movers_count ?? 0} movers`;
      }
      return '<span class="text-gray-300">—</span>';
    }

    function fmtTime(ts) {
      if (!ts || ts === 'None' || ts === 'null') return '<span class="text-gray-300">—</span>';
      try { return new Date(ts).toLocaleString(); } catch { return ts; }
    }

    // ── render ────────────────────────────────────────────────────────────────
    function render() {
      const tbody = document.getElementById('task-tbody');
      const rows = Object.values(tasks).sort((a, b) => {
        const ta = a.completed_at ? new Date(a.completed_at) : new Date(0);
        const tb = b.completed_at ? new Date(b.completed_at) : new Date(0);
        return tb - ta;
      });

      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-5 py-8 text-center text-gray-400 text-sm">No tasks yet.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(t => `
        <tr class="hover:bg-gray-50 transition">
          <td class="px-5 py-3 font-medium text-gray-800">${t.operation}</td>
          <td class="px-5 py-3 font-mono text-gray-400 text-xs">${t.task_id.slice(0, 8)}…</td>
          <td class="px-5 py-3">${statusBadge(t.status)}</td>
          <td class="px-5 py-3 text-gray-600 text-xs">${inputSummary(t.operation, t.input_data)}</td>
          <td class="px-5 py-3 text-gray-700 text-xs leading-relaxed">${summariseResult(t.operation, t.result)}</td>
          <td class="px-5 py-3 text-gray-400 text-xs">${fmtTime(t.completed_at)}</td>
        </tr>
      `).join('');
    }

    // ── boot ──────────────────────────────────────────────────────────────────
    connectWS();
    loadHistory();
  </script>
</body>
</html>
