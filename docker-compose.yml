services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asianmarkets}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-asianmarkets}"]
      interval: 5s
      timeout: 5s
      retries: 10

  node-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-asianmarkets}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  python-api:
    build:
      context: analytics
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-asianmarkets}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - node-api
      - python-api

volumes:
  postgres_data:
